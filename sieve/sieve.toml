[[contracts]]
name = "aave_acl_manager" # role grants/revokes (PoolAdmin, RiskAdmin, EmergencyAdmin)
address = "0xc2aaCf6553D20d1e9d78E365AAba8032af9c85b0"
abi = "abis/aave_acl_manager.json"
start_block = 16291117

[[contracts.events]]
name = "RoleGranted"
table = "aave_acl_manager_role_granted"
[[contracts.events]]
name = "RoleRevoked"
table = "aave_acl_manager_role_revoked"
